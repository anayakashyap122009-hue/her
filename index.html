<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love 💖</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:sans-serif;
  background:black;
  color:white;
}

/* INTRO */
#intro{
  position:absolute;
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:24px;
  background:black;
  z-index:10;
  cursor:pointer;
  text-align:center;
}

/* STARS */
.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  animation:twinkle 2s infinite;
}
@keyframes twinkle{
  0%,100{opacity:0.2;}
  50%{opacity:1;}
}

/* HEARTS */
.heart{
  position:absolute;
  font-size:16px;
  animation:float 6s linear infinite;
}
@keyframes float{
  0%{transform:translateY(100vh);opacity:0;}
  50%{opacity:1;}
  100%{transform:translateY(-10vh);opacity:0;}
}

/* KISS */
.kiss{
  position:absolute;
  font-size:22px;
  pointer-events:none;
}

/* SLIDER */
.slider{
  display:flex;
  width:200%;
  height:100vh;
  transition:1s;
}
.slide{
  width:100%;
  height:100vh;
  position:relative;
}

/* IMAGE STYLE */
img{
  border-radius:12px;
  padding:6px;
  background:white;
  box-shadow:0 8px 25px rgba(0,0,0,0.5);
}

/* CENTER */
.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:220px;
}

/* CORNERS */
.corner{
  position:absolute;
  width:140px;
}
.top-left{top:20px;left:15px;}
.top-right{top:20px;right:15px;}
.bottom-left{bottom:20px;left:15px;}
.bottom-right{bottom:20px;right:15px;}

/* BUTTON */
.btn{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 20px;
  background:white;
  color:black;
  border-radius:25px;
  cursor:pointer;
  font-size:14px;
}

/* SECOND PAGE */
.second{
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

/* IMAGE TEXT */
.image-container{
  position:relative;
}
.image-container img{
  width:240px;
}
.overlay-text{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  font-size:20px;
  text-shadow:0 0 15px pink;
}

/* TEXT */
#para{
  width:90%;
  font-size:16px;
  margin-top:15px;
}

/* FINAL TEXT */
.final{
  font-size:28px;
  opacity:0;
  text-shadow:0 0 25px hotpink;
  transition:1s;
  margin-top:10px;
}
</style>

</head>

<body>

<!-- INTRO -->

<div id="intro" onclick="start()">Tap to enter my world 💖</div>

<!-- MUSIC -->

<audio id="music" loop>
  <source src="song.mp3">
</audio>

<script>
/* STARS */
for(let i=0;i<80;i++){
 let s=document.createElement("div");
 s.className="star";
 s.style.left=Math.random()*100+"%";
 s.style.top=Math.random()*100+"%";
 document.body.appendChild(s);
}

/* HEARTS */
for(let i=0;i<20;i++){
 let h=document.createElement("div");
 h.className="heart";
 h.innerHTML="💖";
 h.style.left=Math.random()*100+"%";
 h.style.animationDuration=(4+Math.random()*3)+"s";
 document.body.appendChild(h);
}
</script>

<div class="slider" id="slider">

<!-- FIRST PAGE -->

<div class="slide">

  <img src="his.jpg" class="center">

  <img src="her.jpg" class="corner top-left">
  <img src="herr.jpg" class="corner top-right">
  <img src="herrr.jpg" class="corner bottom-left">
  <img src="herrrr.jpg" class="corner bottom-right">

  <!-- 4 KISSES -->

  <div class="kiss" id="k1">💋</div>
  <div class="kiss" id="k2">💋</div>
  <div class="kiss" id="k3">💋</div>
  <div class="kiss" id="k4">💋</div>

  <div class="btn" onclick="next()" ontouchstart="next()">Swipe ➡️</div>
</div>

<!-- SECOND PAGE -->

<div class="slide second">

  <div class="image-container">
    <img src="her.jpg">
    <div class="overlay-text">My Beautiful Wifeyy 💖</div>
  </div>

  <p id="para"></p>

  <div class="final" id="final">
    I LOVE YOU LAKSHITA SHARMA 💖
  </div>

</div>

</div>

<script>

/* START */
function start(){
 document.getElementById("intro").style.display="none";
 document.getElementById("music").play();
 animateKisses();
}

/* SLIDE */
function next(){
 document.getElementById("slider").style.transform="translateX(-50%)";
 type();
}

/* TOUCH SWIPE */
let startX=0;
document.addEventListener("touchstart",e=>{
 startX=e.touches[0].clientX;
});
document.addEventListener("touchend",e=>{
 let endX=e.changedTouches[0].clientX;
 if(startX-endX>50){ next(); }
});

/* KISSES */
function animateKisses(){
 let cx=window.innerWidth/2;
 let cy=window.innerHeight/2;

 let targets=[
  {x:40,y:40},
  {x:window.innerWidth-40,y:40},
  {x:40,y:window.innerHeight-40},
  {x:window.innerWidth-40,y:window.innerHeight-40}
 ];

 let kisses=[k1,k2,k3,k4];

 kisses.forEach((k,i)=>{
  function move(){
    k.style.left=cx+"px";
    k.style.top=cy+"px";

    k.animate([
      {transform:"translate(0,0) scale(0.5)",opacity:0},
      {transform:`translate(${targets[i].x-cx}px,${targets[i].y-cy}px) scale(1.2)`,opacity:1}
    ],{duration:2000});
  }
  setInterval(move,2200);
  move();
 });
}

/* TYPE */
let text="You are my world, my happiness, my everything. I will love you forever 💖";
let i=0;

function type(){
 if(i<text.length){
  document.getElementById("para").innerHTML+=text.charAt(i);
  i++;
  setTimeout(type,40);
 } else {
  document.getElementById("final").style.opacity=1;
 }
}

</script>

</body>
</html>
