<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love 💖</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:sans-serif;
  background:black;
  color:white;
}

/* INTRO */
#intro{
  position:absolute;
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:black;
  font-size:28px;
  cursor:pointer;
  z-index:10;
  text-align:center;
}

/* STARS */
.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  animation:twinkle 2s infinite;
}
@keyframes twinkle{
  0%,100%{opacity:0.2;}
  50%{opacity:1;}
}

/* HEARTS */
.heart{
  position:absolute;
  font-size:18px;
  animation:float 6s linear infinite;
}
@keyframes float{
  0%{transform:translateY(100vh);opacity:0;}
  50%{opacity:1;}
  100%{transform:translateY(-10vh);opacity:0;}
}

/* SLIDER */
.slider{
  display:flex;
  width:200%;
  height:100vh;
  transition:1s;
}
.slide{
  width:100%;
  height:100vh;
  position:relative;
}

/* IMAGE STYLE */
img{
  border-radius:15px;
  padding:10px;
  background:white;
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

/* CENTER */
.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.9);
  width:260px;
  animation:zoom 4s infinite alternate;
}
@keyframes zoom{
  to{transform:translate(-50%,-50%) scale(1);}
}

/* CORNERS */
.corner{
  position:absolute;
  width:170px;
}
.top-left{top:40px;left:40px;}
.top-right{top:40px;right:40px;}
.bottom-left{bottom:40px;left:40px;}
.bottom-right{bottom:40px;right:40px;}

/* BUTTON */
.btn{
  position:absolute;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 25px;
  background:white;
  color:black;
  border-radius:25px;
  cursor:pointer;
}

/* SECOND PAGE */
.second{
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

/* IMAGE TEXT */
.image-container{
  position:relative;
}
.overlay-text{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  font-size:30px;
  text-shadow:0 0 20px pink;
}

/* PARAGRAPH */
#para{
  width:70%;
  margin-top:20px;
}

/* FINAL TEXT */
.final{
  font-size:45px;
  opacity:0;
  text-shadow:0 0 30px hotpink;
  transition:1s;
}
</style>

</head>

<body>

<!-- INTRO -->

<div id="intro" onclick="start()">
  Tap to enter my world 💖
</div>

<!-- MUSIC -->

<audio id="music" loop>
  <source src="song.mp3">
</audio>

<!-- STARS + HEARTS -->

<script>
for(let i=0;i<100;i++){
 let s=document.createElement("div");
 s.className="star";
 s.style.left=Math.random()*100+"%";
 s.style.top=Math.random()*100+"%";
 document.body.appendChild(s);
}

for(let i=0;i<25;i++){
 let h=document.createElement("div");
 h.className="heart";
 h.innerHTML="💖";
 h.style.left=Math.random()*100+"%";
 h.style.animationDuration=(4+Math.random()*3)+"s";
 document.body.appendChild(h);
}
</script>

<div class="slider" id="slider">

<!-- FIRST PAGE -->

<div class="slide">
  <img src="his.jpg" class="center">

  <img src="her.jpg" class="corner top-left">
  <img src="herr.jpg" class="corner top-right">
  <img src="herrr.jpg" class="corner bottom-left">
  <img src="herrrr.jpg" class="corner bottom-right">

  <div class="btn" onclick="next()">Swipe ➡️</div>
</div>

<!-- SECOND PAGE -->

<div class="slide second">

  <div class="image-container">
    <img src="her.jpg" width="300">
    <div class="overlay-text">My Beautiful Wifeyy 💖</div>
  </div>

  <p id="para"></p>

  <div class="final" id="final">
    I LOVE YOU LAKSHITA SHARMA 💖
  </div>

</div>

</div>

<script>

/* START */
function start(){
 document.getElementById("intro").style.display="none";
 document.getElementById("music").play();
}

/* SLIDE */
function next(){
 document.getElementById("slider").style.transform="translateX(-50%)";
 type();
}

/* TYPE EFFECT */
let text="You are my world, my happiness, my everything. I will love you forever 💖";
let i=0;

function type(){
 if(i<text.length){
  document.getElementById("para").innerHTML+=text.charAt(i);
  i++;
  setTimeout(type,40);
 } else {
  document.getElementById("final").style.opacity=1;
 }
}

</script>

</body>
</html>
